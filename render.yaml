services:
  - type: web
    name: minhareceita-api
    env: node
    plan: free
    buildCommand: npm ci && npm run build:backend
    startCommand: npm run start:backend
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SERVE_STATIC
        value: "false"
